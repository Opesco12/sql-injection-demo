<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Login</title>
    <link
      rel="stylesheet"
      href="/style.css"
    />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-card">
        <h1>Welcome back</h1>
        <p class="auth-subtitle">Sign in to continue to your dashboard.</p>

        <form
          id="product-login-form"
          class="auth-form"
        >
          <label for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            required
            autocomplete="off"
          />

          <label for="password">Password</label>
          <div class="password-field">
            <input
              id="password"
              name="password"
              type="password"
              required
              autocomplete="off"
            />
            <button
              type="button"
              class="password-toggle"
              data-toggle-password
              aria-label="Show password"
              aria-pressed="false"
            ><span class="icon-eye" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path d="M12 5C6.5 5 2.1 8.4.5 12c1.6 3.6 6 7 11.5 7s9.9-3.4 11.5-7C21.9 8.4 17.5 5 12 5zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/><circle cx="12" cy="12" r="2"/></svg></span></button>
          </div>

          <button
            type="submit"
            class="primary-btn"
          >
            Login
          </button>
        </form>

        <div
          id="product-login-message"
          class="result-message"
        >
          <!-- Use demo accounts like <strong>admin/admin123</strong>. -->
        </div>

        <!-- <div class="auth-links">
          <a href="/demo">Open SQL Injection Demo Lab</a>
        </div> -->
      </section>
    </main>

    <script src="/login.js"></script>
  </body>
</html>
